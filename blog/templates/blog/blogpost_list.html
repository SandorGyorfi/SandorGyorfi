{% extends "base.html" %}

{% block content %}
  <h1 class="mb-4">Blog Posts</h1>
  {% for blogpost in blogposts %}
    <div class="card mb-4">
      <div class="card-body">
        <h2 class="card-title"><a href="{{ blogpost.get_absolute_url }}">{{ blogpost.title }}</a></h2>
        <p class="card-text"><small class="text-muted">{{ blogpost.created_at }}</small></p>
      </div>
    </div>
  {% empty %}
    <p>No blog posts yet.</p>
  {% endfor %}
{% endblock %}
