{% extends "base.html" %}

{% block content %}
<div class="card mb-4">
  <div class="card-body">
    <h2 class="card-title">{{ blogpost.title }}</h2>
    <p class="card-text">{{ blogpost.content }}</p>
    <p class="card-text"><small class="text-muted">{{ blogpost.created_at }}</small></p>
  </div>
</div>

<!-- Share and Copy Link Buttons -->
<button class="btn btn-primary" id="shareBtn"><i class="fas fa-share-alt"></i></button>
<button class="btn btn-primary" id="copyBtn">Copy Link</button>

<!-- Fallback Social Share Links -->
<div id="fallbackShare" style="display:none;">
  <h4>Share this Post On</h4>
  <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}" target="_blank">Facebook</a>
  <a href="https://twitter.com/intent/tweet?text={{ blogpost.title }}&url={{ request.build_absolute_uri }}" target="_blank">X</a>
  <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ request.build_absolute_uri }}&title={{ blogpost.title }}" target="_blank">LinkedIn</a>
</div>


{% endblock %}
