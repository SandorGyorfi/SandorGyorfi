<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Welcome to www.sandorgyorfi.com{% endblock %}</title>
    {% load static %}
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/bootstrap/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="d-flex flex-column min-vh-100">
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid justify-content-between">
                    <a class="navbar-brand" href="#">
                        <img src="{% static 'img/sandorgyorfi_logo.jpg' %}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                        <div class="title-container">
                            <div class="navbar-title" id="navbar-title"></div>
                            <div class="navbar-subtitle" id="navbar-subtitle"></div>
                        </div>
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav ms-auto">
                            <a class="nav-link" href="{% url 'home' %}" data-section="home">Home</a>
                            <a class="nav-link" href="#" data-section="services">Services</a>
                            <a class="nav-link" href="#" data-section="blog">Blog</a>
                            <a class="nav-link" href="#" data-section="appointments">Appointments</a>
                        </div>
                    </div>                    
                </div>
            </nav>
        </header>
        <main class="container mt-4 flex-grow-1">
            {% block content %}
            {% endblock %}
        </main>
        <footer class="footer mt-auto py-3 bg-dark text-white">
            <div class="container">
                <div class="row">
                    <div class="col-md-6 d-flex align-items-center">
                        <span>&copy; {{ year }} www.sandorgyorfi.com | All rights reserved.</span>
                    </div>
                    <div class="col-md-6 d-flex justify-content-md-end align-items-center">
                        <a href="https://www.linkedin.com" target="_blank" class="text-white me-3" aria-label="LinkedIn">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="https://github.com" target="_blank" class="text-white me-3" aria-label="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://www.tiktok.com" target="_blank" class="text-white me-3" aria-label="TikTok">
                            <i class="fab fa-tiktok"></i>
                        </a>
                        <!-- Updated link and icon for X -->
                        <a href="https://x.com" target="_blank" class="text-white me-3" aria-label="X">
                            <i class="fab fa-x"></i> <!-- Assuming 'fa-x' is a placeholder for the actual icon class -->
                        </a>
                    </div>
                </div>
            </div>
        </footer>
        
        
        
    </div>
    <script src="{% static 'js/bootstrap/bootstrap.js' %}"></script>
    <script src="{% static 'js/custom.js' %}"></script>
</body>
</html>
