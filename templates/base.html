<!DOCTYPE html>
{% load static %}

<html lang="en">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7RETHLPZ6G"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-7RETHLPZ6G');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Welcome to www.sandorgyorfi.com{% endblock %}</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/bootstrap/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/navigation.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        #cookieConsentBanner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #343a40;
            color: #ffffff;
            padding: 1rem;
            text-align: center;
            display: none;
            z-index: 1050;
        }

        #acceptCookies {
            background-color: #007bff;
            border-color: #007bff;
            padding: .375rem .75rem;
            border-radius: .25rem;
            color: #fff;
            font-size: 1rem;
            line-height: 1.5;
        }

        #acceptCookies:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
    </style>
</head>

<body>
    <div id="cookieConsentBanner">
        This site uses cookies to improve your experience.
        <button class="btn btn-outline-primary mt-2 align-self-start" id="acceptCookies">Accept</button>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var consent = localStorage.getItem('cookieConsent');
            if (!consent) {
                document.getElementById('cookieConsentBanner').style.display = 'block';
            }
            document.getElementById('acceptCookies').addEventListener('click', function () {
                localStorage.setItem('cookieConsent', 'true');
                document.getElementById('cookieConsentBanner').style.display = 'none';
            });
        });
    </script>
    <div class="d-flex flex-column min-vh-100">
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid justify-content-between">
                    <a class="navbar-brand" href="#">
                        <img src="{% static 'img/sandorgyorfi_logo.jpg' %}" alt="Sándor Győrfi Logo" width="30"
                            height="24" class="d-inline-block align-text-top">
                        <div class="title-container">
                            <div class="navbar-title" id="navbar-title"></div>
                            <div class="navbar-subtitle" id="navbar-subtitle"></div>
                        </div>
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav ms-auto">
                            <a class="nav-link btn btn-outline-primary mt-auto align-self-start" href="{% url 'home' %}"
                                data-section="home">Home</a>
                            <a class="nav-link btn btn-outline-primary mt-auto align-self-start"
                                href="{% url 'services:services' %}" data-section="services">My Services</a>

                            <a class="nav-link btn btn-outline-primary mt-auto align-self-start"
                                href="{% url 'blog:blogpost_list' %}" data-section="blog">Blog</a>
                            <a class="nav-link btn btn-outline-primary mt-auto align-self-start"
                                href="{% url 'contact' %}" data-section="appointments">Contact</a>
                        </div>
                    </div>
                </div>
            </nav>
        </header>
        <main class="container mt-4 flex-grow-1">
            {% block content %}
            {% endblock %}
        </main>
        <footer class="footer mt-auto py-1 bg-dark text-white">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-12 col-md-6 text-center text-md-left mb-3 mb-md-0">
                        <a href="{% url 'home' %}" class="footer-logo-link">
                            <img src="{% static 'img/sandorgyorfi_logo.jpg' %}" alt="Sandor Gyorfi Logo"
                                class="footer-logo">
                        </a>
                        <span class="footer-text">&copy; {% now "Y" %} Sandor Gyorfi | All rights reserved.</span>
                    </div>
                    <nav class="social-icons col-12 col-md-6 text-center text-md-right" aria-labelledby="social-media">
                        <h2 id="social-media" class="sr-only">Social Media</h2>
                        <a href="https://www.linkedin.com" target="_blank" rel="noopener" class="text-white mx-2"
                            aria-label="LinkedIn">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="https://github.com" target="_blank" rel="noopener" class="text-white mx-2"
                            aria-label="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://www.tiktok.com" target="_blank" rel="noopener" class="text-white mx-2"
                            aria-label="TikTok">
                            <i class="fab fa-tiktok"></i>
                        </a>
                        <a href="https://x.com" target="_blank" rel="noopener" class="text-white mx-2" aria-label="X">
                            <i class="fab fa-x"></i>
                        </a>
                    </nav>
                </div>
            </div>
        </footer>
    </div>
    <script src="{% static 'js/bootstrap/bootstrap.js' %}"></script>
    <script src="{% static 'js/custom.js' %}"></script>
    <script src="{% static 'js/contact.js' %}"></script>
</body>

</html>
